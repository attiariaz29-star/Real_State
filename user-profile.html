<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – NestFinder AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/ai-features.css">
  <style>
    .up-container { max-width: 900px; margin: 0 auto; padding: 120px 1rem 3rem; }
    .up-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .up-stat { font-size: 1.5rem; font-weight: 800; color: #f59e0b; }
    .up-label { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
    .up-prop-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.2s;
    }
    .up-prop-item:hover { background: rgba(255,255,255,0.02); }
    .up-prop-item:last-child { border-bottom: none; }
    .up-prop-img {
      width: 60px; height: 45px;
      border-radius: 8px;
      background-size: cover; background-position: center;
      flex-shrink: 0;
    }
    .up-prop-title { font-size: 0.85rem; font-weight: 600; }
    .up-prop-price { font-size: 0.8rem; color: #f59e0b; font-weight: 700; }
  </style>
</head>
<body>
  <div id="navbar-root"></div>
  <div class="up-container" id="profileContainer">
    <div class="text-center py-5">
      <div class="spinner-border text-warning" role="status"></div>
      <p class="text-muted mt-2">Loading profile...</p>
    </div>
  </div>

  <footer class="footer py-5">
    <div class="container text-center">
      <p class="copyright mb-0">&copy; 2026 NestFinder AI. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth-shared.js"></script>
  <script src="js/properties-shared.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const container = document.getElementById("profileContainer");
      const user = NestFinderAuth ? NestFinderAuth.getCurrentUser() : null;
      if (!user) {
        container.innerHTML = '<div class="text-center py-5"><i class="bi bi-person-x" style="font-size:3rem;color:rgba(255,255,255,0.1)"></i><h4 class="mt-3 text-muted">Not Signed In</h4><p class="text-muted"><a href="acc.html" style="color:#f59e0b">Sign in</a> to view your profile.</p></div>';
        return;
      }

      try {
        const allProps = await NestFinderAPI.fetchAll();
        const myProps = allProps.filter(p => p.userId === user.uid || p.userId === user.id);

        const savedKeys = JSON.parse(localStorage.getItem("nf_saved_properties") || "[]");
        const savedProps = allProps.filter(p => savedKeys.includes(p.firebaseKey || p.id));

        const recentKeys = JSON.parse(localStorage.getItem("nf_recently_viewed") || "[]");
        const recentProps = recentKeys.map(key => allProps.find(p => (p.firebaseKey || p.id) === key)).filter(Boolean);

        const formatPrice = (n) => {
          n = Number(n); if (isNaN(n)) return "N/A";
          if (n >= 10000000) return "PKR " + (n / 10000000).toFixed(1) + " Cr";
          if (n >= 100000) return "PKR " + (n / 100000).toFixed(1) + " Lac";
          return "PKR " + n.toLocaleString();
        };

        const propItem = (p) => {
          if (!p) return "";
          const id = p.firebaseKey || p.id;
          const img = (p.images && p.images[0]) || (p.carouselImages && p.carouselImages[0]) || "";
          return `<div class="up-prop-item" onclick="window.location.href='listing.html?id=${id}'">
            <div class="up-prop-img" style="background-image:url('${img || "https://placehold.co/60x45?text=N/A"}')"></div>
            <div style="flex:1"><div class="up-prop-title">${p.title || "Property"}</div><div class="up-prop-price">${formatPrice(p.price)}</div></div>
          </div>`;
        };

        container.innerHTML = `
          <div class="text-center mb-4">
            <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;justify-content:center;margin:0 auto 0.75rem;font-size:1.5rem;font-weight:800;color:#000">
              ${(user.name || user.email || "U")[0].toUpperCase()}
            </div>
            <h2 style="font-weight:800">${user.name || "User"}</h2>
            <p style="color:rgba(255,255,255,0.5);font-size:0.85rem">${user.email || ""}</p>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-4"><div class="up-card text-center"><div class="up-stat">${myProps.length}</div><div class="up-label">My Listings</div></div></div>
            <div class="col-4"><div class="up-card text-center"><div class="up-stat">${savedProps.length}</div><div class="up-label">Saved</div></div></div>
            <div class="col-4"><div class="up-card text-center"><div class="up-stat">${recentProps.length}</div><div class="up-label">Recently Viewed</div></div></div>
          </div>

          <div class="up-card">
            <h5 style="font-weight:700;margin-bottom:1rem"><i class="bi bi-bookmark-fill me-2" style="color:#f59e0b"></i>Saved Properties</h5>
            ${savedProps.length > 0 ? savedProps.map(propItem).join("") : '<p class="text-muted" style="font-size:0.85rem">No saved properties yet. Browse and save properties to see them here.</p>'}
          </div>

          <div class="up-card">
            <h5 style="font-weight:700;margin-bottom:1rem"><i class="bi bi-clock-history me-2" style="color:#f59e0b"></i>Recently Viewed</h5>
            ${recentProps.length > 0 ? recentProps.map(propItem).join("") : '<p class="text-muted" style="font-size:0.85rem">No recently viewed properties.</p>'}
          </div>

          <div class="up-card">
            <h5 style="font-weight:700;margin-bottom:1rem"><i class="bi bi-house-heart me-2" style="color:#f59e0b"></i>My Listings</h5>
            ${myProps.length > 0 ? myProps.map(propItem).join("") : '<p class="text-muted" style="font-size:0.85rem">You haven\'t listed any properties yet. <a href="acc.html" style="color:#f59e0b">Add a property</a></p>'}
          </div>
        `;
      } catch (e) {
        console.error("Profile error:", e);
        container.innerHTML = '<div class="text-center py-5 text-muted">Error loading profile.</div>';
      }
    });
  </script>
  <script src="js/navbar.js"></script>
</body>
</html>
